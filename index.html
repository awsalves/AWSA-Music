<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWSA Music Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer/dist/browser-id3-writer.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    radial-gradient(circle at top left,#ff004c 0%,transparent 25%),
    radial-gradient(circle at bottom right,#ff6600 0%,transparent 25%),
    #0f0f0f;

    color:white;
}

.container{
    width:100%;
    max-width:500px;

    background:rgba(18,18,18,0.92);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:30px;

    padding:32px;

    box-shadow:
    0 0 50px rgba(255,0,76,0.15),
    0 20px 50px rgba(0,0,0,0.6);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:2.2rem;
    font-weight:700;

    background:linear-gradient(90deg,#ff004c,#ff6600);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{
    margin-top:8px;
    color:#9d9d9d;
    font-size:14px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:17px;

    border:none;

    border-radius:18px;

    background:#1d1d1d;

    color:white;

    font-size:15px;

    outline:none;

    transition:0.3s;
}

.input-group input:focus{

    border:1px solid #ff004c;

    box-shadow:
    0 0 20px rgba(255,0,76,0.25);
}

button{
    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(90deg,#ff004c,#ff6600);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(255,0,76,0.35);
}

.loader{
    width:32px;
    height:32px;

    border:3px solid rgba(255,255,255,0.15);

    border-top:3px solid white;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:25px auto;

    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.result{
    margin-top:25px;
    display:none;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{

    background:#171717;

    border-radius:24px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.05);
}

.cover{
    width:100%;
    height:280px;
    object-fit:cover;
}

.info{
    padding:22px;
}

.music-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:8px;
}

.artist{
    color:#999;
    margin-bottom:20px;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;

    background:rgba(0,200,83,0.15);

    color:#00d26a;

    padding:8px 14px;

    border-radius:999px;

    font-size:13px;

    margin-bottom:20px;
}

.download-btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;

    text-decoration:none;

    padding:15px;

    border-radius:18px;

    background:
    linear-gradient(90deg,#00c853,#00a843);

    color:white;

    font-weight:600;

    transition:0.3s;
}

.download-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(0,200,83,0.3);
}

footer{
    margin-top:25px;
    text-align:center;
    color:#666;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">

        <h1>AWSA Music</h1>

        <p>
            Downloader MP3 com capa oficial do álbum
        </p>

    </div>

    <div class="input-group">

        <input
            type="text"
            id="youtubeUrl"
            placeholder="Cole a URL do YouTube"
        >

    </div>

    <button onclick="baixarMusica()">

        Baixar Música

    </button>

    <div class="loader" id="loader"></div>

    <div class="result" id="result">

        <div class="card">

            <img
                id="cover"
                class="cover"
                src=""
            >

            <div class="info">

                <div
                    class="music-title"
                    id="title">
                </div>

                <div
                    class="artist"
                    id="artist">
                </div>

                <div class="badge">

                    ✓ Capa do álbum incorporada

                </div>

                <a
                    id="downloadBtn"
                    class="download-btn"
                    href="#">

                    Download MP3

                </a>

            </div>

        </div>

    </div>

    <footer>

        Powered by AWSA Info

    </footer>

</div>

<script>

async function buscarDadosDeezer(nomeMusica){

    try{

        const searchUrl =
        `https://api.deezer.com/search?q=${encodeURIComponent(nomeMusica)}`;

        const response =
        await fetch(searchUrl);

        const data =
        await response.json();

        const track =
        data.data[0];

        if(!track){

            return null;
        }

        const albumId =
        track.album.id;

        const coverUrl =
        `https://api.deezer.com/album/${albumId}/image?size=xl`;

        return{

            artist:
            track.artist.name,

            albumId,

            coverUrl
        };

    }catch(error){

        console.error(error);

        return null;
    }

}

async function baixarMusica(){

    const url =
    document.getElementById("youtubeUrl").value;

    if(!url){

        alert("Cole uma URL válida.");

        return;
    }

    const loader =
    document.getElementById("loader");

    loader.style.display = "block";

    document.getElementById("result")
    .style.display = "none";

    try{

        // API YouTube

        const api =
        `https://youtube-download-api.matheusishiyama.repl.co/mp3/?url=${encodeURIComponent(url)}`;

        const response =
        await fetch(api);

        const data =
        await response.json();

        console.log(data);

        /*
        Esperado:
        {
            title,
            download
        }
        */

        const title =
        data.title || "Música";

        const mp3Url =
        data.download || data.link;

        // Busca Deezer

        const deezer =
        await buscarDadosDeezer(title);

        const artist =
        deezer?.artist || "Artista desconhecido";

        const cover =
        deezer?.coverUrl ||
        "https://via.placeholder.com/500";

        // Atualiza interface

        document.getElementById("title")
        .innerText = title;

        document.getElementById("artist")
        .innerText = artist;

        document.getElementById("cover")
        .src = cover;

        // Baixa MP3

        const mp3Response =
        await fetch(mp3Url);

        const mp3Blob =
        await mp3Response.blob();

        const mp3Buffer =
        await mp3Blob.arrayBuffer();

        // Baixa capa

        const coverResponse =
        await fetch(cover);

        const coverBlob =
        await coverResponse.blob();

        const coverBuffer =
        await coverBlob.arrayBuffer();

        // Adiciona metadata

        const writer =
        new ID3Writer(mp3Buffer);

        writer
        .setFrame('TIT2', title)
        .setFrame('TPE1', [artist])
        .setFrame('APIC', {
            type: 3,
            data: coverBuffer,
            description: 'Album Cover'
        });

        writer.addTag();

        const taggedBlob =
        writer.getBlob();

        const finalUrl =
        URL.createObjectURL(taggedBlob);

        // Download

        const downloadBtn =
        document.getElementById("downloadBtn");

        downloadBtn.href =
        finalUrl;

        downloadBtn.download =
        `${title}.mp3`;

        document.getElementById("result")
        .style.display = "block";

    }catch(error){

        console.error(error);

        alert("Erro ao baixar música.");

    }finally{

        loader.style.display = "none";
    }

}

</script>

</body>
</html>
