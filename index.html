<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWSA Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#090909;
    --card:#121212;
    --border:rgba(255,255,255,.06);
    --text:#ffffff;
    --muted:#8b8b8b;
    --primary:#ff004c;
    --secondary:#ff6600;
    --success:#00c853;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
        radial-gradient(circle at top left,var(--primary) 0%,transparent 30%),
        radial-gradient(circle at bottom right,var(--secondary) 0%,transparent 30%),
        var(--bg);
    color:var(--text);
    padding:20px;
}

.blur{
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.20;
    z-index:-1;
}

.blur1{
    background:var(--primary);
    top:-150px;
    left:-150px;
}

.blur2{
    background:var(--secondary);
    bottom:-150px;
    right:-150px;
}

.container{
    width:100%;
    max-width:560px;
    background:rgba(18,18,18,.92);
    border:1px solid var(--border);
    border-radius:32px;
    padding:35px;
    backdrop-filter:blur(24px);

    box-shadow:
        0 0 60px rgba(255,0,76,.15),
        0 30px 60px rgba(0,0,0,.6);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:3rem;
    font-weight:800;
    letter-spacing:-1px;

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{
    color:var(--muted);
    margin-top:8px;
    font-size:.95rem;
}

.input-area{
    position:relative;
}

input{
    width:100%;
    padding:18px 20px;
    border:none;
    border-radius:18px;
    background:#171717;
    color:white;
    font-size:15px;
    outline:none;

    border:1px solid var(--border);

    transition:.3s;
}

input:focus{
    border-color:var(--primary);

    background:#1d1d1d;

    box-shadow:
        0 0 25px rgba(255,0,76,.2);
}

button{
    width:100%;
    border:none;
    padding:17px;
    margin-top:18px;
    border-radius:18px;

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)
    );

    color:white;
    font-weight:700;
    font-size:15px;
    cursor:pointer;

    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
}

.loader{
    width:45px;
    height:45px;

    border:4px solid rgba(255,255,255,.08);
    border-top:4px solid var(--primary);

    border-radius:50%;

    animation:spin .8s linear infinite;

    margin:25px auto;

    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

#status{
    text-align:center;
    color:#aaa;
    font-size:13px;
    margin-top:10px;
}

.error{
    margin-top:15px;
    text-align:center;
    color:#ff5252;
    font-size:13px;
}

.result{
    display:none;
    margin-top:30px;
    animation:fade .4s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:var(--card);
    border-radius:24px;
    overflow:hidden;
    border:1px solid var(--border);
}

.cover{
    width:100%;
    height:340px;
    object-fit:cover;
    background:#000;
}

.info{
    padding:24px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
}

.artist{
    color:#aaa;
    font-size:15px;
    margin-bottom:6px;
}

.album{
    color:#666;
    font-size:12px;
    margin-bottom:22px;
}

.download-btn{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

    padding:15px;

    border-radius:16px;

    background:linear-gradient(
        90deg,
        #00c853,
        #00e676
    );

    text-decoration:none;

    color:white;
    font-weight:700;

    transition:.25s;
}

.download-btn:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#666;
    font-size:11px;
}

</style>
</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

    <div class="logo">

        <h1>AWSA Music</h1>

        <p>
            Conversor Premium YouTube → MP3
        </p>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="videoUrl"
            placeholder="Cole o link do YouTube..."
        >

    </div>

    <button id="convertBtn">
        Converter Agora
    </button>

    <div
        class="loader"
        id="loader"
    ></div>

    <div id="status"></div>

    <div
        class="error"
        id="error"
    ></div>

    <div
        class="result"
        id="result"
    >

        <div class="card">

            <img
                id="cover"
                class="cover"
                src=""
            >

            <div class="info">

                <div
                    id="title"
                    class="title"
                ></div>

                <div
                    id="artist"
                    class="artist"
                ></div>

                <div
                    id="album"
                    class="album"
                ></div>

                <a
                    id="downloadBtn"
                    class="download-btn"
                    href="#"
                >
                    Baixar MP3 com Capa
                </a>

            </div>

        </div>

    </div>

    <div class="footer">
        AWSA Music © 2026
    </div>

</div>

<script>

// ======================================
// CONFIG
// ======================================

const APIFY_TOKEN =
"apify_api_vTysQMyAiheE4X5sKTTDCsCu9ieCJH2vpnrU";

const APIFY_ACTOR =
"https://api.apify.com/v2/acts/vvSeSCimywoM62CdX/runs";

const LASTFM_API_KEY =
"934535854489c4330843ffa6fc3878bf";

// ======================================
// ELEMENTOS
// ======================================

const btn =
document.getElementById("convertBtn");

const loader =
document.getElementById("loader");

const statusText =
document.getElementById("status");

const errorText =
document.getElementById("error");

const result =
document.getElementById("result");

// ======================================
// EVENT
// ======================================

btn.addEventListener(
    "click",
    baixarMusica
);

// ======================================
// YOUTUBE ID
// ======================================

function getYoutubeId(url){

    const regExp =
    /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;

    const match =
    url.match(regExp);

    return (
        match &&
        match[2].length === 11
    )
    ? match[2]
    : null;
}

// ======================================
// LAST.FM
// ======================================

async function buscarLastFM(
    artista,
    musica
){

    try{

        const url =
        `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artista)}&track=${encodeURIComponent(musica)}&format=json`;

        const res =
        await fetch(url);

        const data =
        await res.json();

        console.log(data);

        if(
            data.track &&
            data.track.album
        ){

            const images =
            data.track.album.image;

            return{

                title:
                data.track.name ||

                musica,

                artist:
                data.track.artist?.name ||

                artista,

                album:
                data.track.album.title ||

                "Álbum desconhecido",

                cover:
                images?.length
                ? images[
                    images.length - 1
                  ]["#text"]
                : ""
            };
        }

    }catch(err){

        console.log(err);
    }

    return null;
}

// ======================================
// AGUARDAR
// ======================================

function wait(ms){

    return new Promise(
        resolve =>
        setTimeout(resolve,ms)
    );
}

// ======================================
// PRINCIPAL
// ======================================

async function baixarMusica(){

    const input =
    document
        .getElementById(
            "videoUrl"
        )
        .value
        .trim();

    errorText.innerText = "";

    result.style.display =
    "none";

    if(!input){

        errorText.innerText =
        "Cole um link válido.";

        return;
    }

    const videoId =
    getYoutubeId(input);

    if(!videoId){

        errorText.innerText =
        "URL do YouTube inválida.";

        return;
    }

    try{

        btn.disabled = true;

        loader.style.display =
        "block";

        statusText.innerText =
        "Enviando vídeo...";

        // ======================================
        // APIFY
        // ======================================

        const runRes =
        await fetch(
            `${APIFY_ACTOR}?token=${APIFY_TOKEN}`,
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    videoUrls:[input],

                    audioQuality:"192",

                    proxyMode:"residential",

                    maxDurationSeconds:3600
                })
            }
        );

        const runData =
        await runRes.json();

        console.log(runData);

        if(!runData.data){

            throw new Error(
                "Falha conversão"
            );
        }

        const runId =
        runData.data.id;

        statusText.innerText =
        "Convertendo para MP3...";

        // ======================================
        // ESPERAR
        // ======================================

        let datasetId = null;

        for(
            let i = 0;
            i < 40;
            i++
        ){

            await wait(3000);

            const statusRes =
            await fetch(
                `https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_TOKEN}`
            );

            const statusData =
            await statusRes.json();

            const actorStatus =
            statusData.data.status;

            console.log(actorStatus);

            if(
                actorStatus ===
                "SUCCEEDED"
            ){

                datasetId =
                statusData.data.defaultDatasetId;

                break;
            }

            if(
                actorStatus ===
                "FAILED" ||

                actorStatus ===
                "ABORTED"
            ){

                throw new Error(
                    "Falha Actor"
                );
            }
        }

        if(!datasetId){

            throw new Error(
                "Tempo excedido"
            );
        }

        // ======================================
        // RESULTADO
        // ======================================

        statusText.innerText =
        "Obtendo MP3...";

        const dataRes =
        await fetch(
            `https://api.apify.com/v2/datasets/${datasetId}/items?token=${APIFY_TOKEN}`
        );

        const items =
        await dataRes.json();

        console.log(items);

        if(!items.length){

            throw new Error(
                "Sem resultado"
            );
        }

        const music =
        items[0];

        const mp3Url =
        music.audioUrl;

        const title =
        music.title ||
        "AWSA Music";

        const thumbnail =
        music.thumbnailUrl;

        // ======================================
        // EXTRAIR
        // ======================================

        let artista = "";
        let musica = title;

        if(title.includes("-")){

            const split =
            title.split("-");

            artista =
            split[0].trim();

            musica =
            split
                .slice(1)
                .join("-")
                .trim();
        }

        // ======================================
        // LASTFM
        // ======================================

        statusText.innerText =
        "Buscando capa do álbum...";

        const meta =
        await buscarLastFM(
            artista,
            musica
        );

        // ======================================
        // FINAL
        // ======================================

        const finalTitle =
        meta?.title ||
        title;

        const finalArtist =
        meta?.artist ||
        artista ||
        "Artista";

        const finalAlbum =
        meta?.album ||
        "Álbum desconhecido";

        const finalCover =
        meta?.cover ||
        thumbnail;

        // ======================================
        // DOWNLOAD
        // ======================================

        statusText.innerText =
        "Aplicando metadados...";

        const [
            audioRes,
            coverRes
        ] = await Promise.all([

            fetch(mp3Url),

            fetch(finalCover)
        ]);

        const audioBuffer =
        await audioRes.arrayBuffer();

        const coverBuffer =
        await coverRes.arrayBuffer();

        // ======================================
        // ID3
        // ======================================

        const writer =
        new ID3Writer(audioBuffer);

        writer

            .setFrame(
                "TIT2",
                finalTitle
            )

            .setFrame(
                "TPE1",
                [finalArtist]
            )

            .setFrame(
                "TALB",
                finalAlbum
            )

            .setFrame(
                "COMM",
                {
                    description:"AWSA Music",
                    text:"Convertido por AWSA Music"
                }
            )

            .setFrame(
                "APIC",
                {
                    type:3,
                    data:coverBuffer,
                    description:"Cover"
                }
            );

        writer.addTag();

        const taggedBlob =
        writer.getBlob();

        const downloadUrl =
        URL.createObjectURL(
            taggedBlob
        );

        // ======================================
        // UI
        // ======================================

        document.getElementById(
            "cover"
        ).src =
        finalCover;

        document.getElementById(
            "title"
        ).innerText =
        finalTitle;

        document.getElementById(
            "artist"
        ).innerText =
        finalArtist;

        document.getElementById(
            "album"
        ).innerText =
        finalAlbum;

        const dlBtn =
        document.getElementById(
            "downloadBtn"
        );

        dlBtn.href =
        downloadUrl;

        dlBtn.download =
        `${finalTitle} - ${finalArtist}.mp3`;

        loader.style.display =
        "none";

        statusText.innerText =
        "Conversão finalizada.";

        result.style.display =
        "block";

    }catch(err){

        console.error(err);

        loader.style.display =
        "none";

        statusText.innerText =
        "";

        errorText.innerText =
        "Erro ao converter vídeo.";

    }finally{

        btn.disabled = false;
    }
}

</script>

</body>
</html>
