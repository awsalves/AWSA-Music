<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWSA Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer/dist/browser-id3-writer.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top left,#ff004c 0%,transparent 25%),
    radial-gradient(circle at bottom right,#ff6600 0%,transparent 25%),
    #0f0f0f;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    color:white;
}

.container{

    width:100%;
    max-width:520px;

    background:rgba(18,18,18,0.95);

    border-radius:30px;

    padding:30px;

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 0 60px rgba(255,0,76,0.18),
    0 25px 50px rgba(0,0,0,0.6);
}

.logo{

    text-align:center;

    margin-bottom:28px;
}

.logo h1{

    font-size:2.2rem;

    font-weight:700;

    background:
    linear-gradient(90deg,#ff004c,#ff6600);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{

    margin-top:8px;

    color:#999;

    font-size:14px;
}

input{

    width:100%;

    padding:17px;

    border:none;

    border-radius:18px;

    background:#1d1d1d;

    color:white;

    outline:none;

    margin-bottom:18px;
}

input:focus{

    border:1px solid #ff004c;

    box-shadow:
    0 0 20px rgba(255,0,76,0.25);
}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(90deg,#ff004c,#ff6600);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(255,0,76,0.35);
}

.loader{

    width:34px;
    height:34px;

    border:3px solid rgba(255,255,255,0.15);

    border-top:3px solid white;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:25px auto;

    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.error{

    text-align:center;

    margin-top:15px;

    color:#ff8080;
}

.result{

    margin-top:25px;

    display:none;

    animation:fade 0.4s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{

    background:#171717;

    border-radius:25px;

    overflow:hidden;
}

.cover{

    width:100%;

    height:280px;

    object-fit:cover;
}

.info{

    padding:22px;
}

.title{

    font-size:20px;

    font-weight:600;

    margin-bottom:8px;
}

.artist{

    color:#999;

    margin-bottom:18px;
}

.download-btn{

    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;

    padding:15px;

    border-radius:18px;

    text-decoration:none;

    background:
    linear-gradient(90deg,#00c853,#00a843);

    color:white;

    font-weight:600;
}

footer{

    margin-top:25px;

    text-align:center;

    font-size:12px;

    color:#666;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">

        <h1>AWSA Music</h1>

        <p>
            MP3 Downloader com capa oficial
        </p>

    </div>

    <input
        type="text"
        id="youtubeUrl"
        placeholder="Cole a URL do YouTube"
    >

    <button onclick="baixarMusica()">

        Baixar Música

    </button>

    <div class="loader" id="loader"></div>

    <div class="error" id="error"></div>

    <div class="result" id="result">

        <div class="card">

            <img
                id="cover"
                class="cover"
                src=""
            >

            <div class="info">

                <div
                    class="title"
                    id="title">
                </div>

                <div
                    class="artist"
                    id="artist">
                </div>

                <a
                    id="downloadBtn"
                    class="download-btn"
                    href="#">

                    Download MP3

                </a>

            </div>

        </div>

    </div>

    <footer>

        Powered by AWSA Info

    </footer>

</div>

<script>

// Extrair ID do vídeo

function getYoutubeId(url){

    const regExp =
    /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;

    const match =
    url.match(regExp);

    return (match && match[2].length === 11)
    ? match[2]
    : null;
}

// Buscar capa no Deezer

async function buscarDadosDeezer(musica){

    try{

        const proxy =
        "https://corsproxy.io/?";

        const deezerApi =
        `https://api.deezer.com/search?q=${encodeURIComponent(musica)}`;

        const response =
        await fetch(
            proxy + encodeURIComponent(deezerApi)
        );

        const data =
        await response.json();

        if(!data.data || !data.data.length){

            return null;
        }

        const track =
        data.data[0];

        const albumId =
        track.album.id;

        return{

            artist:
            track.artist.name,

            cover:
            `https://api.deezer.com/album/${albumId}/image?size=xl`
        };

    }catch(error){

        console.error(error);

        return null;
    }
}

// Download

async function baixarMusica(){

    const url =
    document.getElementById("youtubeUrl").value;

    const loader =
    document.getElementById("loader");

    const result =
    document.getElementById("result");

    const errorDiv =
    document.getElementById("error");

    errorDiv.innerHTML = "";

    result.style.display = "none";

    if(!url){

        errorDiv.innerHTML =
        "Cole uma URL válida.";

        return;
    }

    try{

        loader.style.display = "block";

        // ID do vídeo

        const videoId =
        getYoutubeId(url);

        if(!videoId){

            throw new Error(
                "ID do vídeo inválido."
            );
        }

        // API MP3

        const api =
        `https://api.download-lagu-mp3.com/@api/json/mp3/${videoId}`;

        const response =
        await fetch(api);

        const data =
        await response.json();

        console.log(data);

        /*
        Exemplo esperado:

        {
            title,
            downloadUrl
        }
        */

        const title =
        data.title ||
        "Música";

        const mp3Url =
        data.downloadUrl ||
        data.download ||
        data.link;

        if(!mp3Url){

            throw new Error(
                "Link MP3 não encontrado."
            );
        }

        // Deezer

        const deezer =
        await buscarDadosDeezer(title);

        const artist =
        deezer?.artist ||
        "Artista desconhecido";

        const cover =
        deezer?.cover ||
        "https://picsum.photos/500";

        // Interface

        document.getElementById("title")
        .innerText = title;

        document.getElementById("artist")
        .innerText = artist;

        document.getElementById("cover")
        .src = cover;

        // Download MP3

        const mp3Response =
        await fetch(mp3Url);

        const mp3Blob =
        await mp3Response.blob();

        const mp3Buffer =
        await mp3Blob.arrayBuffer();

        // Download capa

        const coverResponse =
        await fetch(cover);

        const coverBlob =
        await coverResponse.blob();

        const coverBuffer =
        await coverBlob.arrayBuffer();

        // Metadata ID3

        const writer =
        new ID3Writer(mp3Buffer);

        writer
        .setFrame("TIT2", title)
        .setFrame("TPE1", [artist])
        .setFrame("APIC", {
            type: 3,
            data: coverBuffer,
            description: "Album Cover"
        });

        writer.addTag();

        const taggedBlob =
        writer.getBlob();

        const finalUrl =
        URL.createObjectURL(taggedBlob);

        // Botão

        const downloadBtn =
        document.getElementById("downloadBtn");

        downloadBtn.href =
        finalUrl;

        downloadBtn.download =
        `${title}.mp3`;

        result.style.display =
        "block";

    }catch(error){

        console.error(error);

        errorDiv.innerHTML =
        error.message;

    }finally{

        loader.style.display =
        "none";
    }

}

</script>

</body>
</html>
