<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWSA Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#090909;
    --card:#121212;
    --primary:#ff004c;
    --secondary:#ff6600;
    --text:#ffffff;
    --muted:#8b8b8b;
    --border:rgba(255,255,255,.06);
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:
        radial-gradient(circle at top left,var(--primary) 0%,transparent 30%),
        radial-gradient(circle at bottom right,var(--secondary) 0%,transparent 30%),
        var(--bg);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow:hidden;

    color:var(--text);
}

.blur{
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.18;
    z-index:-1;
}

.blur1{
    background:var(--primary);
    top:-150px;
    left:-150px;
}

.blur2{
    background:var(--secondary);
    bottom:-150px;
    right:-150px;
}

.container{
    width:100%;
    max-width:560px;

    background:rgba(18,18,18,.92);

    border:1px solid var(--border);

    border-radius:32px;

    padding:35px;

    backdrop-filter:blur(24px);

    box-shadow:
        0 0 60px rgba(255,0,76,.15),
        0 30px 60px rgba(0,0,0,.6);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:3rem;
    font-weight:800;

    letter-spacing:-1px;

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{
    margin-top:8px;
    color:var(--muted);
    font-size:.95rem;
}

input{
    width:100%;

    padding:18px 20px;

    border:none;

    border-radius:18px;

    background:#171717;

    color:white;

    outline:none;

    font-size:15px;

    border:1px solid var(--border);

    transition:.25s;
}

input:focus{

    border-color:var(--primary);

    background:#1d1d1d;

    box-shadow:
        0 0 20px rgba(255,0,76,.25);
}

button{
    width:100%;

    margin-top:18px;

    border:none;

    padding:17px;

    border-radius:18px;

    background:linear-gradient(
        90deg,
        var(--primary),
        var(--secondary)
    );

    color:white;

    font-weight:700;

    font-size:15px;

    cursor:pointer;

    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.loader{
    width:45px;
    height:45px;

    border:4px solid rgba(255,255,255,.08);

    border-top:4px solid var(--primary);

    border-radius:50%;

    animation:spin .8s linear infinite;

    margin:25px auto;

    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

#status{
    text-align:center;
    color:#aaa;
    font-size:13px;
}

.error{
    text-align:center;
    color:#ff5252;
    margin-top:15px;
    font-size:13px;
}

.result{
    display:none;
    margin-top:30px;
    animation:fade .4s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card{
    background:var(--card);

    border-radius:24px;

    overflow:hidden;

    border:1px solid var(--border);
}

.cover{
    width:100%;
    height:340px;
    object-fit:cover;
    background:#000;
}

.info{
    padding:24px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
}

.artist{
    color:#aaa;
    margin-bottom:5px;
}

.album{
    color:#666;
    font-size:12px;
    margin-bottom:22px;
}

.download-btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;

    padding:15px;

    border-radius:16px;

    background:linear-gradient(
        90deg,
        #00c853,
        #00e676
    );

    text-decoration:none;

    color:white;

    font-weight:700;

    transition:.25s;
}

.download-btn:hover{
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:11px;
}

</style>
</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

    <div class="logo">

        <h1>AWSA Music</h1>

        <p>
            Conversor Premium YouTube → MP3
        </p>

    </div>

    <input
        type="text"
        id="videoUrl"
        placeholder="Cole o link do YouTube..."
    >

    <button
        id="convertBtn"
    >
        Converter Agora
    </button>

    <div
        class="loader"
        id="loader"
    ></div>

    <div id="status"></div>

    <div
        class="error"
        id="error"
    ></div>

    <div
        class="result"
        id="result"
    >

        <div class="card">

            <img
                id="cover"
                class="cover"
                src=""
            >

            <div class="info">

                <div
                    id="title"
                    class="title"
                ></div>

                <div
                    id="artist"
                    class="artist"
                ></div>

                <div
                    id="album"
                    class="album"
                ></div>

                <a
                    id="downloadBtn"
                    class="download-btn"
                    href="#"
                >
                    Baixar MP3 com Capa
                </a>

            </div>

        </div>

    </div>

    <div class="footer">
        AWSA Music © 2026
    </div>

</div>

<script>

// ======================================
// CONFIG
// ======================================

const API_URL =
"http://localhost:3000/convert";

// ======================================
// ELEMENTOS
// ======================================

const btn =
document.getElementById(
    "convertBtn"
);

const loader =
document.getElementById(
    "loader"
);

const statusText =
document.getElementById(
    "status"
);

const errorText =
document.getElementById(
    "error"
);

const result =
document.getElementById(
    "result"
);

// ======================================
// EVENTO
// ======================================

btn.addEventListener(
    "click",
    baixarMusica
);

// ======================================
// ENTER
// ======================================

document
.getElementById(
    "videoUrl"
)
.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            baixarMusica();
        }
    }
);

// ======================================
// CONVERTER
// ======================================

async function baixarMusica(){

    const input =
    document
        .getElementById(
            "videoUrl"
        )
        .value
        .trim();

    errorText.innerText =
    "";

    result.style.display =
    "none";

    if(!input){

        errorText.innerText =
        "Cole um link válido.";

        return;
    }

    try{

        btn.disabled =
        true;

        loader.style.display =
        "block";

        statusText.innerText =
        "Convertendo vídeo...";

        // ======================================
        // API
        // ======================================

        const response =
        await fetch(
            API_URL,
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({
                    url:input
                })
            }
        );

        const data =
        await response.json();

        console.log(data);

        if(
            !data.success
        ){

            throw new Error(
                data.error
            );
        }

        statusText.innerText =
        "Baixando MP3...";

        // ======================================
        // AUDIO + COVER
        // ======================================

        const [
            audioRes,
            coverRes
        ] = await Promise.all([

            fetch(data.mp3),

            fetch(data.cover)
        ]);

        const audioBuffer =
        await audioRes.arrayBuffer();

        const coverBuffer =
        await coverRes.arrayBuffer();

        // ======================================
        // ID3 TAG
        // ======================================

        statusText.innerText =
        "Aplicando metadados...";

        const writer =
        new ID3Writer(
            audioBuffer
        );

        writer

            .setFrame(
                "TIT2",
                data.title
            )

            .setFrame(
                "TPE1",
                [data.artist]
            )

            .setFrame(
                "TALB",
                data.album
            )

            .setFrame(
                "COMM",
                {
                    description:
                    "AWSA Music",

                    text:
                    "Convertido por AWSA Music"
                }
            )

            .setFrame(
                "APIC",
                {
                    type:3,
                    data:coverBuffer,
                    description:
                    "Cover"
                }
            );

        writer.addTag();

        const taggedBlob =
        writer.getBlob();

        const downloadUrl =
        URL.createObjectURL(
            taggedBlob
        );

        // ======================================
        // UI
        // ======================================

        document.getElementById(
            "cover"
        ).src =
        data.cover;

        document.getElementById(
            "title"
        ).innerText =
        data.title;

        document.getElementById(
            "artist"
        ).innerText =
        data.artist;

        document.getElementById(
            "album"
        ).innerText =
        data.album;

        const dlBtn =
        document.getElementById(
            "downloadBtn"
        );

        dlBtn.href =
        downloadUrl;

        dlBtn.download =
        `${data.title} - ${data.artist}.mp3`;

        loader.style.display =
        "none";

        statusText.innerText =
        "Conversão finalizada.";

        result.style.display =
        "block";

    }catch(err){

        console.log(err);

        loader.style.display =
        "none";

        statusText.innerText =
        "";

        errorText.innerText =
        "Erro ao converter vídeo.";
    }

    finally{

        btn.disabled =
        false;
    }
}

</script>

</body>
</html>
